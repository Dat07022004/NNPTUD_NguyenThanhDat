<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::content})}">

<head>
    <title>Thêm Danh Mục</title>
</head>

<body>

    <div th:fragment="content">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="card shadow" style="border-radius:12px; overflow:hidden; border:none;">
                    <div class="card-header border-0 pt-4 pb-3 px-4" style="background:#fff;">
                        <div class="d-flex align-items-center gap-3">
                            <div
                                style="width:42px;height:42px;background:#fed700;border-radius:10px;display:flex;align-items:center;justify-content:center;">
                                <i class="fas fa-tags" style="color:#333;font-size:18px;"></i>
                            </div>
                            <div>
                                <h4 class="mb-0 fw-bold">Thêm Danh Mục Mới</h4>
                                <p class="mb-0 text-muted" style="font-size:13px;">Điền thông tin và chọn ảnh đại diện
                                    cho danh mục</p>
                            </div>
                        </div>
                    </div>

                    <div class="card-body p-4" style="background:#fafafa;">
                        <form th:action="@{/categories/add}" th:object="${category}" method="post"
                            enctype="multipart/form-data">

                            <!-- Tên danh mục -->
                            <div class="mb-4">
                                <label for="name" class="form-label fw-semibold">
                                    <i class="fas fa-folder me-1" style="color:#cd1818;"></i>
                                    Tên danh mục <span class="text-danger">*</span>
                                </label>
                                <input type="text" class="form-control form-control-lg" id="name" th:field="*{name}"
                                    placeholder="Ví dụ: Điện thoại, Laptop, Phụ kiện..." style="border-radius:8px;"
                                    required>
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('name')}"
                                    th:errors="*{name}">Lỗi tên</div>
                            </div>

                            <!-- Danh mục cha -->
                            <div class="mb-4">
                                <label for="parentCategory" class="form-label fw-semibold">
                                    <i class="fas fa-level-up-alt me-1"
                                        style="color:#cd1818; transform: rotate(90deg);"></i>
                                    Danh mục cha (Tùy chọn)
                                </label>
                                <select class="form-select form-select-lg" id="parentCategory"
                                    th:field="*{parentCategory}" style="border-radius:8px;">
                                    <option value="">-- Là danh mục gốc (Cấp 1) --</option>
                                    <option th:each="pCat : ${parentCategories}" th:value="${pCat.id}"
                                        th:text="${pCat.name}">
                                    </option>
                                </select>
                                <div class="form-text mt-1" style="font-size:12px;">Nếu chọn danh mục cha, đây sẽ là
                                    danh mục con (Cấp 2). Thường danh mục cấp 2 không cần chọn ảnh đại diện.</div>
                            </div>

                            <!-- Phần ảnh đại diện -->
                            <div class="mb-4">
                                <label class="form-label fw-semibold">
                                    <i class="fas fa-image me-1" style="color:#cd1818;"></i>
                                    Ảnh đại diện danh mục
                                </label>

                                <!-- Preview ảnh -->
                                <div id="imagePreviewWrapper" style="width:100%;height:180px;border:2px dashed #ddd;border-radius:12px;
                                            display:flex;align-items:center;justify-content:center;
                                            background:#f8f8f8;margin-bottom:12px;overflow:hidden;position:relative;
                                            transition:border-color 0.2s;">
                                    <div id="previewPlaceholder" style="text-align:center;color:#aaa;">
                                        <i class="fas fa-panorama"
                                            style="font-size:40px;display:block;margin-bottom:8px;"></i>
                                        <span style="font-size:13px;">Xem trước ảnh ở đây</span>
                                    </div>
                                    <img id="imagePreview" src="" alt="Preview"
                                        style="display:none;width:100%;height:100%;object-fit:contain;padding:8px;">
                                </div>

                                <!-- Tabs lựa chọn -->
                                <ul class="nav nav-pills mb-3" id="imageTabs" role="tablist"
                                    style="background:#eff0f1;border-radius:8px;padding:4px;">
                                    <li class="nav-item" role="presentation" style="flex:1;">
                                        <button class="nav-link active w-100" id="upload-tab" data-bs-toggle="pill"
                                            data-bs-target="#uploadPanel" type="button" role="tab"
                                            style="border-radius:6px;font-size:13px;">
                                            <i class="fas fa-upload me-1"></i> Upload từ máy
                                        </button>
                                    </li>
                                    <li class="nav-item" role="presentation" style="flex:1;">
                                        <button class="nav-link w-100" id="url-tab" data-bs-toggle="pill"
                                            data-bs-target="#urlPanel" type="button" role="tab"
                                            style="border-radius:6px;font-size:13px;">
                                            <i class="fas fa-link me-1"></i> Nhập URL ảnh
                                        </button>
                                    </li>
                                </ul>

                                <div class="tab-content">
                                    <!-- Upload file -->
                                    <div class="tab-pane fade show active" id="uploadPanel" role="tabpanel">
                                        <label for="imageFile" id="dropZone" style="display:flex;align-items:center;gap:12px;padding:14px 16px;
                                                      border:2px dashed #ced4da;border-radius:10px;cursor:pointer;
                                                      background:#fff;transition:all 0.2s;">
                                            <div
                                                style="width:44px;height:44px;background:#fed700;border-radius:8px;
                                                        display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                                                <i class="fas fa-cloud-upload-alt"
                                                    style="font-size:20px;color:#333;"></i>
                                            </div>
                                            <div>
                                                <div class="fw-semibold" style="font-size:14px;">Chọn hoặc kéo thả ảnh
                                                    vào đây</div>
                                                <div class="text-muted" style="font-size:12px;">PNG, JPG, WEBP — Tối đa
                                                    5MB</div>
                                            </div>
                                            <span id="fileNameLabel" class="ms-auto text-muted"
                                                style="font-size:12px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
                                        </label>
                                        <input type="file" class="d-none" id="imageFile" name="imageFile"
                                            accept="image/*" onchange="handleFileChange(this)">
                                    </div>

                                    <!-- URL ảnh -->
                                    <div class="tab-pane fade" id="urlPanel" role="tabpanel">
                                        <div class="input-group">
                                            <span class="input-group-text" style="background:#fff;">
                                                <i class="fas fa-link text-muted"></i>
                                            </span>
                                            <input type="text" class="form-control" id="imageUrl" name="imageUrl"
                                                placeholder="https://example.com/image.jpg"
                                                oninput="handleUrlInput(this.value)">
                                            <button type="button" class="btn btn-outline-secondary"
                                                onclick="handleUrlInput(document.getElementById('imageUrl').value)">
                                                <i class="fas fa-eye"></i>
                                            </button>
                                        </div>
                                        <div class="form-text mt-1">Dán đường dẫn URL hình ảnh trực tiếp</div>
                                    </div>
                                </div>
                            </div>

                            <!-- Actions -->
                            <div class="d-flex gap-2 justify-content-end mt-4">
                                <a href="/products" class="btn btn-light px-4"
                                    style="border-radius:8px;font-weight:500;">
                                    <i class="fas fa-times me-1"></i> Hủy bỏ
                                </a>
                                <button type="submit" class="btn px-5 fw-bold"
                                    style="background:#fed700;border-color:#fed700;color:#333;border-radius:8px;">
                                    <i class="fas fa-save me-1"></i> Lưu danh mục
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <style>
            #dropZone:hover {
                border-color: #fed700 !important;
                background: #fffdf0 !important;
            }

            #imageTabs .nav-link.active {
                background: #fff;
                color: #333;
                box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
                font-weight: 600;
            }

            #imageTabs .nav-link:not(.active) {
                color: #666;
            }

            #imagePreviewWrapper.has-image {
                border-color: #fed700;
                background: #fff;
            }
        </style>

        <script>
            function handleFileChange(input) {
                const file = input.files[0];
                if (!file) return;
                document.getElementById('fileNameLabel').textContent = file.name;
                const reader = new FileReader();
                reader.onload = function (e) {
                    showPreview(e.target.result);
                };
                reader.readAsDataURL(file);
            }

            function handleUrlInput(url) {
                if (!url || !url.trim()) return;
                showPreview(url.trim());
            }

            function showPreview(src) {
                const preview = document.getElementById('imagePreview');
                const placeholder = document.getElementById('previewPlaceholder');
                const wrapper = document.getElementById('imagePreviewWrapper');
                preview.src = src;
                preview.style.display = 'block';
                placeholder.style.display = 'none';
                wrapper.classList.add('has-image');
                preview.onerror = function () {
                    preview.style.display = 'none';
                    placeholder.style.display = 'block';
                    wrapper.classList.remove('has-image');
                    placeholder.innerHTML = '<i class="fas fa-exclamation-circle" style="font-size:36px;color:#e57373;display:block;margin-bottom:8px;"></i><span style="font-size:13px;color:#e57373;">Không thể tải ảnh — kiểm tra lại URL</span>';
                };
            }
        </script>
    </div>

</body>

</html>

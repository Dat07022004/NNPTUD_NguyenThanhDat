name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: dat07022004

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Validate Docker credentials
        run: |
          if [ -z "${DOCKERHUB_USERNAME}" ]; then
            echo "DOCKERHUB_USERNAME is empty"
            exit 1
          fi
          if [ -z "${{ secrets.DOCKER_ACCESS_TOKEN }}" ]; then
            echo "Secret DOCKER_ACCESS_TOKEN is missing or empty"
            exit 1
          fi

      - name: Docker Login
        uses: docker/login-action@v4.0.0
        with:
          registry: docker.io
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name: Build and push Docker images
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/nguyenthanhdatdocker:latest
            ${{ env.DOCKERHUB_USERNAME }}/nguyenthanhdatdocker:${{ github.sha }}

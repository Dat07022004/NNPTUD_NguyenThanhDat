<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <title>Danh sách đơn hàng</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body>
    <section layout:fragment="content" class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="fas fa-clipboard-list me-2"></i>Danh sách đơn hàng</h2>
            <a th:href="@{/products}" class="btn btn-primary">
                <i class="fas fa-shopping-cart me-2"></i>Tiếp tục mua sắm
            </a>
        </div>

        <div th:if="${orders.isEmpty()}" class="alert alert-info text-center">
            <i class="fas fa-info-circle me-2"></i>Chưa có đơn hàng nào.
        </div>

        <div th:unless="${orders.isEmpty()}" class="card shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Mã ĐH</th>
                                <th>Khách hàng</th>
                                <th>Số điện thoại</th>
                                <th>Ngày đặt</th>
                                <th class="text-end">Tổng tiền</th>
                                <th class="text-center">Điểm thưởng</th>
                                <th class="text-center">Trạng thái</th>
                                <th class="text-center">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="order : ${orders}">
                                <td>
                                    <a th:href="@{/order/details/{id}(id=${order.id})}" 
                                        class="text-decoration-none fw-bold">
                                        #<span th:text="${order.id}">1</span>
                                    </a>
                                </td>
                                <td th:text="${order.customerName}">Nguyễn Văn A</td>
                                <td th:text="${order.customerPhone}">0912345678</td>
                                <td th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}">12/03/2026</td>
                                <td class="text-end fw-bold text-danger" 
                                    th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + '₫'">
                                    0₫
                                </td>
                                <td class="text-center">
                                    <span class="fw-semibold text-primary" th:text="${order.rewardPoints != null ? order.rewardPoints : 0} + ' điểm'">0 điểm</span>
                                </td>
                                <td class="text-center">
                                    <span th:if="${order.status == 'PENDING'}" class="badge bg-warning text-dark">
                                        <i class="fas fa-clock me-1"></i>Chờ xử lý
                                    </span>
                                    <span th:if="${order.status == 'CONFIRMED'}" class="badge bg-info">
                                        <i class="fas fa-check me-1"></i>Đã xác nhận
                                    </span>
                                    <span th:if="${order.status == 'DELIVERED'}" class="badge bg-success">
                                        <i class="fas fa-check-double me-1"></i>Đã giao
                                    </span>
                                    <span th:if="${order.status == 'CANCELLED'}" class="badge bg-danger">
                                        <i class="fas fa-times me-1"></i>Đã hủy
                                    </span>
                                </td>
                                <td class="text-center">
                                    <div class="btn-group btn-group-sm">
                                        <a th:href="@{/order/details/{id}(id=${order.id})}" 
                                            class="btn btn-outline-primary" title="Xem chi tiết">
                                            <i class="fas fa-eye"></i>
                                        </a>
                                        <a th:href="@{/order/delete/{id}(id=${order.id})}" 
                                            class="btn btn-outline-danger" 
                                            title="Xóa"
                                            onclick="return confirm('Bạn có chắc muốn xóa đơn hàng này?')">
                                            <i class="fas fa-trash"></i>
                                        </a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>
</body>
</html>

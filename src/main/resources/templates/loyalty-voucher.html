<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
    <title>Doi diem lay voucher</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body>
<section layout:fragment="content" class="container mt-4">
    <div class="row g-4">
        <div class="col-lg-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h4 class="mb-3">Diem tich luy cua ban</h4>
                    <div class="display-6 fw-bold text-primary" th:text="${points}">0</div>
                    <div class="text-muted mt-2">
                        Tong gia tri tich luy
                        <span class="fw-semibold" th:text="${#numbers.formatDecimal(rewardValue,0,'COMMA',0,'POINT')} + ' VND'">0 VND</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h4 class="mb-3">Doi diem lay voucher</h4>

                    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
                    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                    <div class="row g-3">
                        <div class="col-md-6" th:each="opt : ${options}">
                            <div class="border rounded p-3 h-100 d-flex flex-column justify-content-between">
                                <div>
                                    <div class="fw-semibold">Goi voucher</div>
                                    <div class="text-muted small mt-1" th:text="${opt.pointsRequired} + ' diem -> ' + ${#numbers.formatDecimal(opt.discountValue,0,'COMMA',0,'POINT')} + ' VND'"></div>
                                </div>
                                <form th:action="@{/loyalty/redeem}" method="post" class="mt-3">
                                    <input type="hidden" name="points" th:value="${opt.pointsRequired}">
                                    <button type="submit" class="btn btn-primary btn-sm w-100"
                                            th:disabled="${points < opt.pointsRequired}">
                                        Doi ngay
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm mt-4">
                <div class="card-body">
                    <h5 class="mb-3">Voucher da doi</h5>
                    <div th:if="${#lists.isEmpty(vouchers)}" class="text-muted">Ban chua doi voucher nao.</div>
                    <div class="table-responsive" th:unless="${#lists.isEmpty(vouchers)}">
                        <table class="table table-hover">
                            <thead>
                            <tr>
                                <th>Ma voucher</th>
                                <th>Diem da dung</th>
                                <th>Gia tri</th>
                                <th>Trang thai</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="v : ${vouchers}">
                                <td class="fw-semibold" th:text="${v.voucherCode}">VC-EXAMPLE</td>
                                <td th:text="${v.pointsSpent}">0</td>
                                <td th:text="${#numbers.formatDecimal(v.discountValue,0,'COMMA',0,'POINT')} + ' VND'">0 VND</td>
                                <td>
                                    <span class="badge bg-success" th:text="${v.status}">ACTIVE</span>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
